<!DOCTYPE html>
<html>
<head>
  <title>Enhancivity Login</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <div class="container">
    <div id="login-view">
      <img src="../images/icon48.png" alt="Enhancivity Logo">
      <h2>Welcome</h2>
      <p>Log in to access your Enhancivity tools.</p>
      
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required class="input-field">
        <input type="password" id="password" placeholder="Password" required class="input-field">
        <button type="submit" class="btn" id="login-btn">Log In</button>
      </form>

      <div class="separator">or</div>

      <button id="google-login-btn" class="btn google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.927-2.184l-2.909-2.259c-.806.54-1.837.86-3.018.86-2.344 0-4.486-1.584-5.195-3.715H.802v2.411C2.318 15.923 5.426 18 9 18z" fill="#34A853"/><path d="M3.805 10.702a5.36 5.36 0 0 1 0-3.404V4.887H.802a9.018 9.018 0 0 0 0 6.627l3.003-2.412z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.426 0 2.318 2.077.802 5.288l3.003 2.411C4.514 5.474 6.656 3.89 9 3.58z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
      
      <p id="error-message" class="error-message"></p>
    </div>

    <div id="logged-in-view" style="display: none;">
      <img src="../images/icon48.png" alt="Enhancivity Logo">
      <h2>Connected</h2>
      <!-- Logout not fully implemented yet as it requires clearing cookie/storage -->
      <button id="logout-btn" class="btn">Sign Out</button> 
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
