<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enhancivity</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── AUTH VIEW ─────────────────────────────────────────── -->
  <div id="auth-view" class="view hidden">
    <div class="auth-container">
      <div class="auth-logo-wrap">
        <img src="../images/icon48.png" alt="Enhancivity" class="logo">
      </div>
      <h2>Enhancivity</h2>
      <p class="auth-subtitle">Your Chief of Staff, always on.</p>

      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required class="input-field">
        <input type="password" id="password" placeholder="Password" required class="input-field">
        <button type="submit" class="btn btn-primary" id="login-btn">Log In</button>
      </form>

      <div class="separator">or</div>

      <button id="google-login-btn" class="btn btn-google">
        <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.658 12.075 17.64 9.767 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.927-2.184l-2.909-2.259c-.806.54-1.837.86-3.018.86-2.344 0-4.486-1.584-5.195-3.715H.802v2.411C2.318 15.923 5.426 18 9 18z" fill="#34A853"/>
          <path d="M3.805 10.702a5.36 5.36 0 0 1 0-3.404V4.887H.802a9.018 9.018 0 0 0 0 8.226l3.003-2.411z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.426 0 2.318 2.077.802 5.288l3.003 2.411C4.514 5.474 6.656 3.89 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <p id="auth-error" class="error-message"></p>
    </div>
  </div>

  <!-- ── MAIN VIEW ─────────────────────────────────────────── -->
  <div id="main-view" class="view hidden">

    <!-- Header -->
    <header class="main-header">
      <div class="header-left">
        <span class="brand-text">Enhancivity</span>
      </div>
      <div class="header-right">
        <div id="memory-indicator" class="memory-indicator hidden">
          <span class="memory-pulse"></span>
          <span class="memory-text">Memory Synced</span>
        </div>
        <button id="sign-out-btn" class="icon-btn" title="Sign Out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Context Badge (subtle, below header) -->
    <div class="context-strip">
      <span id="context-badge" class="context-badge">General</span>
    </div>

    <!-- Chat Area (scrollable) -->
    <div id="chat-area" class="chat-area">
      <!-- Greeting / placeholder -->
      <div id="chat-greeting" class="chat-greeting">
        <div class="greeting-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 16v-4"/>
            <path d="M12 8h.01"/>
          </svg>
        </div>
        <p class="greeting-text">Ready to analyze current context...</p>
      </div>

      <!-- Loading Indicator -->
      <div id="loading-bar" class="loading-bar hidden">
        <div class="loading-spinner"></div>
        <span>Thinking with your memory...</span>
      </div>

      <!-- Results Area (rendered dynamically) -->
      <div id="results-area" class="results-area hidden">
      </div>

      <!-- Error Area -->
      <p id="main-error" class="error-message"></p>
    </div>

    <!-- Input Area (fixed bottom) -->
    <div class="input-area">
      <div class="input-pill" id="input-pill">
        <input
          type="text"
          id="prompt-input"
          class="prompt-field"
          placeholder="Command Enhancivity..."
          autocomplete="off"
        >
        <button id="submit-btn" class="send-btn" title="Send" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
