<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interaction Engine — Required Fields Test Harness</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; }
    input, textarea, select { display: block; margin-bottom: 12px; padding: 6px; width: 280px; }
  </style>
</head>
<body>

  <h1>Required Fields Test</h1>

  <form id="test-form">
    <!-- Required text input — empty -->
    <label for="req-name">Name *</label>
    <input id="req-name" name="name" type="text" required placeholder="Your name">

    <!-- Required email — empty -->
    <label for="req-email">Email *</label>
    <input id="req-email" name="email" type="email" required placeholder="Your email">

    <!-- Required select — empty (value="") -->
    <label for="req-country">Country *</label>
    <select id="req-country" name="country" required>
      <option value="">-- Choose --</option>
      <option value="us">United States</option>
      <option value="uk">United Kingdom</option>
    </select>

    <!-- Required checkbox — unchecked -->
    <label><input id="req-terms" name="terms" type="checkbox" required> I agree to the terms *</label>

    <!-- Required radio group — none selected -->
    <label>Plan *</label>
    <label><input name="plan" type="radio" value="free" required> Free</label>
    <label><input name="plan" type="radio" value="pro" required> Pro</label>

    <!-- Required textarea — empty -->
    <label for="req-message">Message *</label>
    <textarea id="req-message" name="message" required placeholder="Your message"></textarea>

    <!-- aria-required field — empty -->
    <label for="req-aria">Phone *</label>
    <input id="req-aria" name="phone" type="tel" aria-required="true" placeholder="Your phone">

    <!-- NOT required — should be excluded -->
    <label for="optional-field">Nickname (optional)</label>
    <input id="optional-field" name="nickname" type="text" placeholder="Optional">

    <!-- Required but hidden — should be excluded -->
    <input id="req-hidden" name="token" type="hidden" required value="">

    <!-- Required but invisible (display:none) — should be excluded -->
    <input id="req-invisible" name="tracking" type="text" required style="display:none;">

    <!-- Pre-filled required field — should NOT appear in empty list -->
    <label for="req-filled">City * (pre-filled)</label>
    <input id="req-filled" name="city" type="text" required value="Berlin">

  </form>

</body>
</html>
