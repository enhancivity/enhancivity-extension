<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPA Stale SID Test Harness</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    button { margin: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    #danger-btn { background: #ef4444; color: white; border: none; border-radius: 4px; }
    #safe-btn   { background: #6366f1; color: white; border: none; border-radius: 4px; }
    #confirm-btn { background: #22c55e; color: white; border: none; border-radius: 4px; }
    #phase-indicator { margin-top: 16px; font-size: 12px; color: #888; }
    #click-log { margin-top: 16px; font-size: 12px; color: #333; }
  </style>
</head>
<body>
  <h2>SPA Stale SID Test Harness</h2>
  <div id="app">
    <!-- Phase A: two buttons. After SPA nav, DOM is replaced. -->
    <button id="danger-btn">DELETE ALL DATA</button>
    <button id="safe-btn">View Details</button>
  </div>
  <div id="phase-indicator">Phase: A</div>
  <div id="click-log">Clicks: none</div>

  <script>
    // Track every button click so the test can assert which element was clicked
    window.__clickLog = [];
    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') {
        const text = e.target.textContent.trim();
        window.__clickLog.push(text);
        document.getElementById('click-log').textContent = 'Clicks: ' + window.__clickLog.join(', ');
      }
    });

    // Poll mock server: when explore-step is in-flight, server sets spaStaleReady=true.
    // We immediately do pushState to simulate SPA re-render while the AI is deciding.
    let phaseChanged = false;
    const MOCK_BASE = window.location.origin; // points to http://localhost:3099

    const poll = setInterval(async function() {
      if (phaseChanged) { clearInterval(poll); return; }
      try {
        const res = await fetch(MOCK_BASE + '/test/spa-stale-ready');
        const data = await res.json();
        if (!data.ready) return;

        // Signal received — do the SPA re-render NOW
        phaseChanged = true;
        clearInterval(poll);

        // Replace DOM with Phase B (different elements, butt-0 will be reassigned)
        document.getElementById('app').innerHTML =
          '<button id="safe-btn">View Details</button>' +
          '<button id="confirm-btn">Confirm</button>';
        document.getElementById('phase-indicator').textContent = 'Phase: B';

        // Trigger the real SPA navigation event that background.js listens to
        window.history.pushState({ phase: 'B' }, '', window.location.pathname + '?phase=B');
      } catch (_) {
        // Non-fatal — network error during poll
      }
    }, 50);
  </script>
</body>
</html>
