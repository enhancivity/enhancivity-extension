<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post-Click DOM Verify Test Harness</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    button { margin: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    #load-btn { background: #6366f1; color: white; border: none; border-radius: 4px; }
    #load-btn.loading { background: #9ca3af; cursor: wait; }
    #result { margin-top: 16px; font-size: 14px; color: #111; font-weight: bold; }
    #click-log { margin-top: 8px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h2>Post-Click DOM Verify Test Harness</h2>
  <div id="app">
    <button id="load-btn">Load Content</button>
  </div>
  <div id="result"></div>
  <div id="click-log">Clicks: none</div>

  <script>
    // Track every button click so the test can assert which element was clicked
    window.__clickLog = [];
    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') {
        const text = e.target.textContent.trim();
        window.__clickLog.push(text);
        document.getElementById('click-log').textContent = 'Clicks: ' + window.__clickLog.join(', ');
      }
    });

    // When Load Content is clicked:
    //   1. Immediately adds CSS class "loading" — fingerprint IDENTICAL (no element/text change)
    //   2. After 1500ms: appends result text — fingerprint CHANGES (textLength increases)
    //
    // This simulates the real-world pattern: click → spinner → content loads 1500ms later.
    // Without waitForDomChange, waitForDomStable exits at ~450ms (sees unchanged fingerprint)
    // and the snapshot captures the spinner state. With the fix, polling waits for the
    // fingerprint to shift before handing off to waitForDomStable.
    document.getElementById('load-btn').addEventListener('click', function() {
      const btn = document.getElementById('load-btn');
      btn.classList.add('loading');

      setTimeout(function() {
        document.getElementById('result').textContent = 'FINAL CONTENT LOADED';
        btn.classList.remove('loading');
      }, 1500);
    });
  </script>
</body>
</html>
