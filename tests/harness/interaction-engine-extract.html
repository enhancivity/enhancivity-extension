<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interaction Engine — Extraction + Transfer Test Harness</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .section { margin-bottom: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
    h2 { margin-top: 0; font-size: 14px; color: #666; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    th { background: #f5f5f5; }
    .card { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; }
    .card-title { font-weight: bold; font-size: 16px; }
    .card-price { color: green; }
    .card-link { color: blue; }
    label { display: block; margin-bottom: 4px; font-size: 13px; }
    input, textarea, select { display: block; margin-bottom: 12px; padding: 6px; width: 280px; }
  </style>
</head>
<body>

  <h1>Extraction + Transfer Test</h1>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TABLE: Product data                                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Product Table</h2>
    <table id="product-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><a href="https://example.com/widget">Widget</a></td>
          <td>$9.99</td>
          <td>142</td>
        </tr>
        <tr>
          <td><a href="https://example.com/gadget">Gadget</a></td>
          <td>$24.50</td>
          <td>57</td>
        </tr>
        <tr>
          <td>Doohickey</td>
          <td>$3.75</td>
          <td>890</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TABLE: No thead (headers in first row)              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Simple Table (no thead)</h2>
    <table id="simple-table">
      <tr><td>Name</td><td>Age</td></tr>
      <tr><td>Alice</td><td>30</td></tr>
      <tr><td>Bob</td><td>25</td></tr>
    </table>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CARDS: Product cards                                -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Product Cards</h2>
    <div class="product-card card">
      <div class="card-title">Wireless Mouse</div>
      <div class="card-price">$29.99</div>
      <a class="card-link" href="https://example.com/mouse">View</a>
    </div>
    <div class="product-card card">
      <div class="card-title">USB Keyboard</div>
      <div class="card-price">$49.99</div>
      <a class="card-link" href="https://example.com/keyboard">View</a>
    </div>
    <div class="product-card card">
      <div class="card-title">Monitor Stand</div>
      <div class="card-price">$15.00</div>
      <a class="card-link" href="https://example.com/stand">View</a>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FORM: For findField testing                         -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Form (for findField)</h2>
    <form id="test-form">
      <label for="ff-name">Full Name</label>
      <input id="ff-name" name="full_name" type="text" placeholder="Enter your name">

      <label for="ff-email">Email Address</label>
      <input id="ff-email" name="email" type="email" placeholder="you@example.com">

      <div>
        <span>Phone Number</span>
        <input id="ff-phone" name="phone" type="tel" placeholder="555-1234">
      </div>

      <input id="ff-city" type="text" aria-label="City" placeholder="City">

      <textarea id="ff-notes" name="notes" placeholder="Additional notes"></textarea>
    </form>
  </div>

</body>
</html>
