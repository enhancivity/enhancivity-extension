<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Only Harness</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 24px;
      background: #fffaf0;
      color: #1f2937;
    }

    .shell {
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.1);
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      cursor: pointer;
      font-size: 24px;
    }

    #status {
      margin-top: 16px;
      font-weight: 600;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Icon Only Button Harness</h1>
    <p>This button has no visible label text but does expose ARIA metadata.</p>

    <button id="home-button" class="icon-button" type="button" aria-label="Home">
      <span aria-hidden="true">⌂</span>
    </button>

    <div id="status">idle</div>
  </div>

  <script>
    const button = document.getElementById('home-button');
    const status = document.getElementById('status');

    button.addEventListener('click', () => {
      status.textContent = 'clicked-home';
      button.setAttribute('data-activated', 'true');
    });
  </script>
</body>
</html>
