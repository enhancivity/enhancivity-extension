<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interaction Engine — Click Test Harness</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .section { margin-bottom: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
    h2 { margin-top: 0; font-size: 14px; color: #666; }
    #click-counter { font-size: 24px; font-weight: bold; margin: 8px 0; }
    #scroll-tall { height: 300px; overflow-y: auto; border: 1px solid #999; }
    #scroll-spacer { height: 1200px; }
    #scroll-button { margin: 4px; }
  </style>
</head>
<body>

  <h1>Click Test Harness</h1>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Basic button with click counter                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Basic Click Counter</h2>
    <button id="count-btn">Click Me</button>
    <div id="click-counter">0</div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SVG icon inside a role=button div                   -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Icon Button (SVG inside role=button)</h2>
    <div id="icon-btn-parent" role="button" tabindex="0" style="cursor:pointer; display:inline-flex; align-items:center; padding:8px 16px; border:1px solid #999; border-radius:4px;">
      <svg id="icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <circle cx="8" cy="8" r="6"/>
      </svg>
      <span id="icon-label" style="margin-left:8px;">Icon Button</span>
    </div>
    <div id="icon-click-result"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Nested span inside <a> tag                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Nested Span in Link</h2>
    <a id="link-parent" href="#clicked" style="text-decoration:none;">
      <span id="link-inner-span">Click this inner span</span>
    </a>
    <div id="link-click-result"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Hidden button that reveals after 500ms              -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Delayed Reveal Button</h2>
    <button id="delayed-btn" style="display:none;">I appeared!</button>
    <div id="delayed-click-result"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Disabled button                                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Disabled Button</h2>
    <button id="disabled-btn" disabled>Can't Click Me</button>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Off-screen button at bottom of scroll container     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="section">
    <h2>Scroll Target Button</h2>
    <div id="scroll-tall">
      <div id="scroll-spacer"></div>
      <button id="scroll-button">I'm way down here</button>
    </div>
    <div id="scroll-click-result"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Scripts                                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <script>
    // Click counter
    let clickCount = 0;
    document.getElementById('count-btn').addEventListener('click', () => {
      clickCount++;
      document.getElementById('click-counter').textContent = String(clickCount);
    });

    // Icon button click handler
    document.getElementById('icon-btn-parent').addEventListener('click', () => {
      document.getElementById('icon-click-result').textContent = 'icon-clicked';
    });

    // Link click handler
    document.getElementById('link-parent').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('link-click-result').textContent = 'link-clicked';
    });

    // Delayed reveal: show after 500ms
    setTimeout(() => {
      document.getElementById('delayed-btn').style.display = '';
    }, 500);

    document.getElementById('delayed-btn').addEventListener('click', () => {
      document.getElementById('delayed-click-result').textContent = 'delayed-clicked';
    });

    // Scroll button click handler
    document.getElementById('scroll-button').addEventListener('click', () => {
      document.getElementById('scroll-click-result').textContent = 'scroll-clicked';
    });

    // Expose click count for test assertions
    window.getClickCount = () => clickCount;
  </script>

</body>
</html>
