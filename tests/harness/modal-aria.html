<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ARIA Modal Harness</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #eef2ff;
      color: #111827;
    }

    .page {
      padding: 48px;
    }

    .dialog-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.45);
    }

    .dialog-card {
      width: 360px;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.16);
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>ARIA Modal Harness</h1>
    <p>The visible dialog on this page is identified only through ARIA attributes.</p>
  </div>

  <div class="dialog-shell">
    <section id="aria-dialog" role="dialog" aria-modal="true" aria-label="Confirm action">
      <div class="dialog-card">
        <h2>Confirm action</h2>
        <p>Please review the modal detector output.</p>
        <button type="button" aria-label="Confirm">Confirm</button>
      </div>
    </section>
  </div>
</body>
</html>
