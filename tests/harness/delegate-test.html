<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delegate Test Harness</title>
</head>
<body>
  <h1>Delegation Test Page</h1>
  <p>Simulates the dashboard's Delegate button flow.</p>

  <button id="delegate-btn" data-task-id="test-delegate-001" data-task-title="Buy a t-shirt on Amazon">
    Delegate
  </button>

  <script>
    document.getElementById('delegate-btn').addEventListener('click', function () {
      const btn = this;
      window.postMessage({
        type: 'DELEGATE_TASK',
        source: 'enhancivity-dashboard',
        payload: {
          taskId: btn.dataset.taskId,
          taskTitle: btn.dataset.taskTitle,
          taskDescription: 'Size M, under $30, blue preferred',
          priority: 'HIGH',
          dueDate: null,
          tags: ['shopping'],
        },
      }, '*');
      btn.dataset.clicked = 'true';
    });
  </script>
</body>
</html>
